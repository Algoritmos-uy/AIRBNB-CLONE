<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reserva</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header class="c-navbar">
    <div class="o-container c-navbar__inner">
      <a href="/" class="c-navbar__brand">Alquileres Premium</a>
      <nav id="primary-nav" class="c-navbar__nav" aria-label="Navegación principal">
        <a href="/" class="c-navbar__link">Inicio</a>
        <a href="/#view-payments" class="c-navbar__link">Pagos</a>
      </nav>
      <button class="c-navbar__theme" aria-label="Cambiar tema" aria-pressed="false"></button>
      <button class="c-navbar__toggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="primary-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main class="o-container">
    <section class="c-panel" id="reserve-property">
      <h1>Reserva tu estadía</h1>
      <p id="reserve-summary">Cargando propiedad...</p>
    </section>

    <section class="c-panel">
      <h2>Datos de la reserva</h2>
      <p id="login-alert" class="c-alert c-alert--warn" hidden>Debes iniciar sesión para reservar. <a href="index.html#view-auth">Ir a iniciar sesión</a></p>
      <form id="reserve-form" class="c-form c-form--stack">
        <input type="hidden" name="property_id" id="property-id" />
        <label>Nombre completo
          <input name="full_name" type="text" required minlength="3" placeholder="Tu nombre" />
        </label>
        <label>Email
          <input name="email" type="email" required placeholder="tu@email.com" />
        </label>
        <label>Teléfono
          <input name="phone" type="tel" required placeholder="Ej: +1 555 123 4567" />
        </label>
        <label>Fecha de entrada
          <input id="input-check-in" name="check_in" type="text" required autocomplete="off" />
        </label>
        <label>Fecha de salida
          <input id="input-check-out" name="check_out" type="text" required autocomplete="off" />
        </label>
        <label>Huéspedes
          <input name="guests" type="number" min="1" max="12" value="1" required />
        </label>
        <button type="submit" class="c-btn">Confirmar reserva</button>
        <p class="c-form__feedback" id="reserve-feedback"></p>
      </form>
    </section>
  </main>

  <footer class="c-footer">
    <div class="o-container">
      <p>© 2026 Alquileres Premium.</p>
      <p>Desarrollado por Willans Junes.</p>
      <p><a href="https://www.algoritmos.uy" target="_blank" rel="noopener">www.algoritmos.uy</a></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script type="module" src="js/reserve.js"></script>
</body>
</html>
